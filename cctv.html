<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCTV – Security Monitor</title>
  <link rel="stylesheet" href="cctv.css">
</head>
<body>
  <header class="header">
    <nav class="nav" aria-label="Main">
      <a href="cctv.html" class="nav-link active" aria-current="page">CCTV</a>
      <a href="database.html" class="nav-link">Database</a>
    </nav>
  </header>

  <main class="main">
    <div class="cctv-layout">
      <div class="video-column">
        <div class="video-wrapper" id="video-wrapper">
          <video id="cctv-video" class="cctv-video" muted playsinline>
            <source src="assets/placeholder.mp4" type="video/mp4">
            Your browser does not support the video tag.
          </video>
        </div>
      </div>
      <div class="controls-column">
        <div class="control-group">
          <label for="datetime-select">Date / Time</label>
          <select id="datetime-select" aria-label="Select date and time">
            <option value="">-- Select --</option>
            <option value="wrong1">Jan 15, 2024 02:30</option>
            <option value="correct">Mar 22, 2024 14:45</option>
            <option value="wrong2">Jun 10, 2024 09:00</option>
            <option value="wrong3">Dec 01, 2023 18:20</option>
          </select>
        </div>
        <div class="knobs">
          <div class="knob-group">
            <label id="knob-volume-label">Volume</label>
            <div class="knob" id="knob-volume" role="slider" aria-label="Volume" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0"></div>
          </div>
          <div class="knob-group">
            <label id="knob-brightness-label">Brightness</label>
            <div class="knob" id="knob-brightness" role="slider" aria-label="Brightness" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50" tabindex="0"></div>
          </div>
        </div>
        <div class="progress-section">
          <p class="progress-label">Signal quality</p>
          <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="3">
            <div class="progress-segment" id="segment-datetime" data-task="datetime"></div>
            <div class="progress-segment" id="segment-knobs" data-task="knobs"></div>
            <div class="progress-segment" id="segment-physical" data-task="physical"></div>
          </div>
          <p class="progress-hint" id="progress-hint">Adjust date/time, knobs, and complete the physical puzzle.</p>
        </div>
      </div>
    </div>
  </main>

  <script src="cctv.js"></script>
</body>
</html>
