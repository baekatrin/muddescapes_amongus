<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCTV Footage and Database</title>
  <link rel="stylesheet" href="index.css" />
  <link rel="stylesheet" href="nav.css" />
  <script type="module" src="https://unpkg.com/input-knob"></script>
</head>

<body class="has-fixed-nav">
  <header class="site-header">
    <nav class="links" aria-label="Sections">
      <ul>
        <li><a href="index.html" aria-current="page">CCTV</a></li>
        <li><a href="database.html">Database</a></li>
      </ul>
    </nav>
    <hr class="nav-rule">
  </header>

  <div class="cctv-container">
    <div class="cctv-date-time">
      <label for="date">Select Date:</label>
      <input type="date" id="date" name="footage-date" value="2050-01-01" min="2000-01-01" max="3000-01-01">
      <label for="time">Select Time:</label>
      <input type="time" id="time" name="footage-time">
    </div>
    <div class="cctv-display">
      <div class="cctv-cam">
        <video id="vid1" src="./data/1000106648.mp4" type="video/mp4" loop autoplay muted playsinline></video>
        <button hidden class="cctv-mute" onclick="toggleMute(this)">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
            class="bi bi-volume-mute-fill" viewBox="0 0 16 16">
            <path
              d="M6.717 3.55A.5.5 0 0 1 7 4v8a.5.5 0 0 1-.812.39L3.825 10.5H1.5A.5.5 0 0 1 1 10V6a.5.5 0 0 1 .5-.5h2.325l2.363-1.89a.5.5 0 0 1 .529-.06m7.137 2.096a.5.5 0 0 1 0 .708L12.207 8l1.647 1.646a.5.5 0 0 1-.708.708L11.5 8.707l-1.646 1.647a.5.5 0 0 1-.708-.708L10.793 8 9.146 6.354a.5.5 0 1 1 .708-.708L11.5 7.293l1.646-1.647a.5.5 0 0 1 .708 0" />
          </svg>
        </button>
        <p> CAM 1 </p>
        <img src="./data/rec-overlay.png"></image>
      </div>
      <div class="cctv-cam">
        <video id="vid2" src="./data/1000106669.mp4" type="video/mp4" loop autoplay muted playsinline></video>
        <button hidden class="cctv-mute" onclick="toggleMute(this)">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
            class="bi bi-volume-mute-fill" viewBox="0 0 16 16">
            <path
              d="M6.717 3.55A.5.5 0 0 1 7 4v8a.5.5 0 0 1-.812.39L3.825 10.5H1.5A.5.5 0 0 1 1 10V6a.5.5 0 0 1 .5-.5h2.325l2.363-1.89a.5.5 0 0 1 .529-.06m7.137 2.096a.5.5 0 0 1 0 .708L12.207 8l1.647 1.646a.5.5 0 0 1-.708.708L11.5 8.707l-1.646 1.647a.5.5 0 0 1-.708-.708L10.793 8 9.146 6.354a.5.5 0 1 1 .708-.708L11.5 7.293l1.646-1.647a.5.5 0 0 1 .708 0" />
          </svg>
        </button>
        <p> CAM 2 </p>
        <img src="./data/rec-overlay.png"></image>
      </div>
      <div class="cctv-cam">
        <video id="vid3" src="./data/1000106671.mp4" type="video/mp4" loop autoplay muted playsinline></video>
        <button hidden class="cctv-mute" onclick="toggleMute(this)">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
            class="bi bi-volume-mute-fill" viewBox="0 0 16 16">
            <path
              d="M6.717 3.55A.5.5 0 0 1 7 4v8a.5.5 0 0 1-.812.39L3.825 10.5H1.5A.5.5 0 0 1 1 10V6a.5.5 0 0 1 .5-.5h2.325l2.363-1.89a.5.5 0 0 1 .529-.06m7.137 2.096a.5.5 0 0 1 0 .708L12.207 8l1.647 1.646a.5.5 0 0 1-.708.708L11.5 8.707l-1.646 1.647a.5.5 0 0 1-.708-.708L10.793 8 9.146 6.354a.5.5 0 1 1 .708-.708L11.5 7.293l1.646-1.647a.5.5 0 0 1 .708 0" />
          </svg>
        </button>
        <p> CAM 3 </p>
        <img src="./data/rec-overlay.png"></image>
      </div>
      <div class="cctv-cam">
        <video id="vid4" src="./data/1000106680.mp4" type="video/mp4" loop autoplay muted playsinline></video>
        <button hidden class="cctv-mute" onclick="toggleMute(this)">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
            class="bi bi-volume-mute-fill" viewBox="0 0 16 16">
            <path
              d="M6.717 3.55A.5.5 0 0 1 7 4v8a.5.5 0 0 1-.812.39L3.825 10.5H1.5A.5.5 0 0 1 1 10V6a.5.5 0 0 1 .5-.5h2.325l2.363-1.89a.5.5 0 0 1 .529-.06m7.137 2.096a.5.5 0 0 1 0 .708L12.207 8l1.647 1.646a.5.5 0 0 1-.708.708L11.5 8.707l-1.646 1.647a.5.5 0 0 1-.708-.708L10.793 8 9.146 6.354a.5.5 0 1 1 .708-.708L11.5 7.293l1.646-1.647a.5.5 0 0 1 .708 0" />
          </svg>
        </button>
        <p> CAM 4 </p>
        <img src="./data/rec-overlay.png"></image>
      </div>
    </div>

    <div class="knob-container">
      <div class="knob" id="knob1">
        <input-knob value="0" scale="100" min="0" max="100">
          <div class="knob-inner"></div>
        </input-knob>
        <div class="led">
          <img id="led1" src="./data/led-off.png" width="50" height="45"></image>
        </div>
      </div>

      <div class="knob" id="knob2">
        <input-knob value="0" scale="100" min="0" max="100">
          <div class="knob-inner"></div>
        </input-knob>
        <div class="led">
          <img id="led2" src="./data/led-off.png" width="50" height="45"></image>
        </div>
      </div>

      <div class="knob" id="knob3">
        <input-knob value="0" scale="100" min="0" max="100">
          <div class="knob-inner"></div>
        </input-knob>
        <div class="led">
          <img id="led3" src="./data/led-off.png" width="50" height="45"></image>
        </div>
      </div>

      <div class="knob" id="knob4">
        <input-knob value="0" scale="100" min="0" max="100">
          <div class="knob-inner"></div>
        </input-knob>
        <div class="led">
          <img id="led4" src="./data/led-off.png" width="50" height="45"></image>
        </div>
      </div>
    </div>
  </div>

  <div class="checklist">
    <p hidden id="knobs-success">Knobs are correct! Audio capabilities have been restored.</p>
    <p hidden id="date-time-success">Date and time are correct! Footage has been displayed.</p>
  </div>
  <script src="index.js"></script>
</body>

</html>
